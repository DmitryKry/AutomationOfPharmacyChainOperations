<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<HEAD>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <script th:inline="javascript">
        const FORM_STORAGE_KEY = 'pharmacyFormData';

        function saveFormData() {
            const formData = {
                name: document.getElementById('name_pharmacy')?.value || '',
                legal_name: document.getElementById('legal_name_pharmacy')?.value || '',
                inn: document.getElementById('INN')?.value || '',
                kpp: document.getElementById('KPP')?.value || '',
                ogrn: document.getElementById('OGRN')?.value || '',
                address: document.getElementById('adress_pharmacy')?.value || '',
                postal_code: document.getElementById('POSTAL_CODE')?.value || ''
            };
            sessionStorage.setItem(FORM_STORAGE_KEY, JSON.stringify(formData));
        }

        function restoreFormData() {
            const savedData = sessionStorage.getItem(FORM_STORAGE_KEY);
            if (savedData) {
                const formData = JSON.parse(savedData);

                if (document.getElementById('name_pharmacy'))
                    document.getElementById('name_pharmacy').value = formData.name || '';
                if (document.getElementById('legal_name_pharmacy'))
                    document.getElementById('legal_name_pharmacy').value = formData.legal_name || '';
                if (document.getElementById('INN'))
                    document.getElementById('INN').value = formData.inn || '';
                if (document.getElementById('KPP'))
                    document.getElementById('KPP').value = formData.kpp || '';
                if (document.getElementById('OGRN'))
                    document.getElementById('OGRN').value = formData.ogrn || '';
                if (document.getElementById('adress_pharmacy'))
                    document.getElementById('adress_pharmacy').value = formData.address || '';
                if (document.getElementById('POSTAL_CODE'))
                    document.getElementById('POSTAL_CODE').value = formData.postal_code || '';
            }
        }

        function clearFormData() {
            sessionStorage.removeItem(FORM_STORAGE_KEY);
        }

        function attachAutoSave() {
            const inputs = ['name_pharmacy', 'legal_name_pharmacy', 'INN', 'KPP', 'OGRN', 'adress_pharmacy', 'POSTAL_CODE'];
            inputs.forEach(id => {
                const input = document.getElementById(id);
                if (input) {
                    input.addEventListener('input', () => saveFormData());
                    input.addEventListener('change', () => saveFormData());
                }
            });
        }

        function attachLinkHandlers() {
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                link.addEventListener('click', () => saveFormData());
            });
        }

        function uploadPhoto(input) {
            let formData = new FormData();
            formData.append('photo', input.files[0]);
            formData.append('pharmacyID', document.getElementById('pharmacyID').value);
            document.getElementById('preview').src = URL.createObjectURL(input.files[0]);

            fetch('/api/pharmacy/pharmacyCreate/uploadPhoto', {
                method: 'POST',
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('preview').src = data.photoUrl + '?t=' + new Date().getTime();
                        document.getElementById('status').innerHTML = '✓ Загружено';
                        setTimeout(() => document.getElementById('status').innerHTML = '', 2000);
                    }
                })
                .catch(() => document.getElementById('status').innerHTML = '✗ Ошибка');
        }

        document.addEventListener('DOMContentLoaded', () => {
            restoreFormData();
            attachAutoSave();
            attachLinkHandlers();

            const form = document.querySelector('form');
            if (form) {
                form.addEventListener('submit', () => clearFormData());
            }
        });
    </script>
</HEAD>
<body>
<div class="AllInfo">
    <div class="menu">
        <a class="authorization" th:href="@{/api/pharmacy/login}" th:text="#{authorization}"></a>
        <a class="registration" th:href="@{/api/pharmacy/registration}" th:text="#{registration}"></a>
        <a class="about_of_pharmacy" th:text="#{about_of_pharmacy}"></a>
        <a class="pharmacies" th:text="#{pharmacies}" th:href="@{/api/pharmacy/pharmacy}"></a>
        <a class="medicines" th:text="#{medicines}" th:href="@{/api/pharmacy/medicinePlace}"></a>
    </div>
    <div th:id="forPhoto">
        <input type="file" id="fileInput" accept="image/*" onchange="uploadPhoto(this);">
        <input type="hidden" id="pharmacyID" th:value="${pharmacy != null ? pharmacy.getId() : ''}">
        <img id="preview" th:src="${photos != null && photos.getPhotoPath() != null ? photos.getPhotoPath() : ''}">
    </div>

    <form th:action="@{/api/pharmacy/pharmacyCreate}" method="post">

        <div class="createObject" th:id="pharmacies" >
            <h3 th:text="#{pharmacy.registration.details}"></h3>
            <div class="form-group">
                <label for="name_pharmacy" th:text="#{name_pharmacy}"></label>
                <br>
                <input type="text" id="name_pharmacy" name="name" th:value="${pharmacy != null ? pharmacy.getName() : ''}">
            </div>
            <div class="form-group">
                <label for="legal_name_pharmacy" th:text="#{legal_name_pharmacy}"></label>
                <br>
                <input type="text" id="legal_name_pharmacy" name="legal_name"
                       th:value="${pharmacy != null ? pharmacy.getLegal_name() : ''}">
            </div>
            <div class="form-group">
                <label for="INN" th:text="#{INN}"></label>
                <br>
                <input type="text" id="INN" name="inn" th:value="${pharmacy != null ? pharmacy.getInn() : ''}">
            </div>
            <div class="form-group">
                <label for="KPP" th:text="#{KPP}"></label>
                <br>
                <input type="text" id="KPP" name="kpp" th:value="${pharmacy != null ? pharmacy.getKpp() : ''}">
            </div>
            <div class="form-group">
                <label for="OGRN" th:text="#{OGRN}"></label>
                <br>
                <input type="text" id="OGRN" name="ogrn" th:value="${pharmacy != null ? pharmacy.getOgrn() : ''}">
            </div>
            <input type="hidden" name="photoID" th:value="${photos != null ? photos.getId() : ''}">

        </div>
        <div class="createObject" th:id="pharmaciesSecond">
            <h3 th:text="#{pharmacy.contact.info}"></h3>
            <div class="form-group">
                <label for="adress_pharmacy" th:text="#{adress_pharmacy}"></label>
                <br>
                <input type="text" id="adress_pharmacy" name="address" th:value="${pharmacy != null ? pharmacy.getAddress() : ''}">
            </div>
            <div class="form-group">
                <label for="CITY" th:text="#{CITY}"></label>
                <input type="hidden" th:name="ID_CITY" th:value="${idCity}">
                <input type="text" id="CITY"  th:value="${selectCity}" readonly >
            </div>
            <a th:href="@{/api/pharmacy/pharmacyCreate(addCity=${addCity == false ? true : false},
            selectAdmin=${selectAdmin}, idAdmin=${idAdmin}, pharmacyID=${pharmacy != null ? pharmacy.getId() : ''},
            photoID=${photos != null ? photos.getId() : ''})}"
               th:text="#{find}"></a>
            <div class="form-group">
                <label for="REGION" th:text="#{REGION}"></label>
                <br>
                <input type="text" id="REGION" name="region" th:value="${selectCityRegion}" readonly>
            </div>
            <div class="form-group">
                <label for="fioInput" th:text="#{administrator}"></label>
                <input type="hidden" th:name="idAdmin" th:value="${idAdmin}">
                <input type="text" id="fioInput"  th:value="${selectAdmin}" readonly >
            </div>
            <a th:href="@{/api/pharmacy/pharmacyCreate(addAdministrator=${addAdministrator == false ? true : false},
            idCity=${idCity}, selectCity=${selectCity},
            selectCityRegion=${selectCityRegion}, pharmacyID=${pharmacy != null ? pharmacy.getId() : ''},
            photoID=${photos != null ? photos.getId() : ''})}"
               th:text="#{find}"></a>
            <div class="form-group">
                <label for="POSTAL_CODE" th:text="#{POSTAL_CODE}"></label>
                <br>
                <input type="text" id="POSTAL_CODE" name="postal_code"
                       th:value="${pharmacy != null ? pharmacy.getPostal_code() : ''}">
            </div>
        </div>
        <button type="submit" th:class="ButtonPost" th:id="createPharmacy" th:text="#{create}"></button>
    </form>
    <div th:class="findPerconal" th:if="${addAdministrator == true}">
        <div>
            <form th:action="@{/api/pharmacy/addAdministrator(source='pharmacyEdit',
            selectCity=${selectCity}, selectCityRegion=${selectCityRegion}, idCity=${idCity},
                        selectAdmin=${selectAdmin}, idAdmin=${idAdmin}, pharmacyID=${pharmacy != null ? pharmacy.getId() : ''},
            photoID=${photos != null ? photos.getId() : ''})}" method="post">
                <input th:type="text" th:name="addAdministratorName">
                <button th:text="#{find}">
                </button>
            </form>
        </div>
        <div th:id="contentForFindPerconal">
            <ul>
                <li th:each="a : ${addAdministrators}">
                    <div th:id="Transfer">
                        <a th:class="personnelLists" th:href="@{/api/pharmacy/pharmacyCreate(idAdmin=${a.getId()},
                        selectAdmin=${a.userFio}, idCity=${idCity}, selectCity=${selectCity},
                        selectCityRegion=${selectCityRegion}, pharmacyID=${pharmacy != null ? pharmacy.getId() : ''},
            photoID=${photos != null ? photos.getId() : ''})}">
                            <span th:text="${a.userFio} + ' id: ' + ${a.getId()}"></span>
                        </a>
                    </div>
                </li>
            </ul>
        </div>
        <div>
            <a th:href="@{/api/pharmacy/workerCreate}"th:text="#{add}"></a>
            <a th:href="@{/api/pharmacy/pharmacyCreate(addAdministrator=${false}, idAdmin=${idAdmin},
                        selectAdmin=${selectAdmin}, idCity=${idCity}, selectCity=${selectCity},
                        selectCityRegion=${selectCityRegion}, pharmacyID=${pharmacy != null ? pharmacy.getId() : ''},
            photoID=${photos != null ? photos.getId() : ''})}" th:text="#{cancel}"></a>
        </div>
    </div>
    <div th:class="findPerconal" th:if="${addCity == true}">
        <div>
            <form th:action="@{/api/pharmacy/addCity(source='pharmacyEdit',
            selectCity=${selectCity}, selectCityRegion=${selectCityRegion}, idCity=${idCity},
                        selectAdmin=${selectAdmin}, idAdmin=${idAdmin}, pharmacyID=${pharmacy != null ? pharmacy.getId() : ''})}" method="post">
                <input name="city" th:type="text">
                <button th:text="#{find}">
                </button>
            </form>
        </div>
        <div th:id="contentForFindPerconal">
            <ul>
                <li th:each="c : ${cities}">
                    <div th:id="Transfer">
                        <a th:class="personnelLists" th:href="@{/api/pharmacy/pharmacyCreate(
                        selectCity=${c.getName()}, selectCityRegion=${c.getRegion()}, idCity=${c.id},
                        selectAdmin=${selectAdmin}, idAdmin=${idAdmin}, pharmacyID=${pharmacy != null ? pharmacy.getId() : ''},
            photoID=${photos != null ? photos.getId() : ''})}">
                            <span th:text="${c.getName()}"></span>
                        </a>
                    </div>
                </li>
            </ul>
        </div>
        <div>
            <a th:href="@{/api/pharmacy/pharmacyCreate(createCity = ${true})}"th:text="#{add}"></a>
            <a th:href="@{/api/pharmacy/pharmacyCreate(addAdministrator=${false},
            selectCity=${selectCity}, selectCityRegion=${selectCityRegion}, idCity=${idCity},
                        selectAdmin=${selectAdmin}, idAdmin=${idAdmin}, pharmacyID=${pharmacy != null ? pharmacy.getId() : ''})}" th:text="#{cancel}"></a>
        </div>
    </div>
    <div th:class="findPerconal" th:id="createCity" th:if="${createCity == true}">
        <form th:action="@{/api/pharmacy/pharmacyCreate/createCity(selectAdmin=${selectAdmin}, idAdmin=${idAdmin})}" method="post">
            <label for="createC" th:text="#{CITY}"></label>
            <br>
            <input id="createC"  th:name="name" th:type="text">
            <br>
            <label for="createR" th:text="#{REGION}"></label>
            <br>
            <input id="createR" th:name="region" th:type="text">
            <br>
            <button th:text="#{create}"></button>

        </form>
        <div>
            <a th:href="@{/api/pharmacy/pharmacyCreate(createRole=false, addRole=true)}" th:text="#{cancel}"></a>
        </div>
    </div>
</div>
<div th:class="findPerconal" th:id="okForm" th:if="${InfoErrorShow == true}">
    <H3 th:text="${InfoError}"></H3>
    <div>
        <a th:href="@{/api/pharmacy/pharmacyCreate(InfoErrorShow = false)}" th:text="#{Ok}"></a>
    </div>
</div>
</body>
</HTML>
