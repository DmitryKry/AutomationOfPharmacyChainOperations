<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<HEAD>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</HEAD>
<body>
<div class="menu">
    <a class="authorization" th:href="@{/api/pharmacy/login}" th:text="#{authorization}"></a>
    <a class="registration" th:href="@{/api/pharmacy/registration}" th:text="#{registration}"></a>
</div>
<form th:action="@{/api/pharmacy/login}" method="post" th:if="${user == null}">
    <div class="Entrace">
        <h2 th:text="#{view.title}"></h2>
        <div class="form-group">
            <label for="login" th:text="#{login}"></label>
            <br>
            <input type="text" id="login" name="login" required>
        </div>
        <div class="form-group">
            <label for="password" th:text="#{password}"></label>
            <br>
            <input type="password" id="password" name="password" required>
            <button type="submit" th:class="ButtonPost" th:text="#{entrace}"></button>
        </div>
        <div th:id="more_active" style="display: flex; justify-content: center; align-items: center;">
            <a th:id="registration_maybe" th:href="@{/api/pharmacy/registration}" th:text="#{registration_maybe}"></a>
        </div>
    </div>
    <div th:class="findPerconal" th:id="okForm" th:if="${InfoErrorShow == true}">
        <H3 th:text="${InfoError}"></H3>
        <div>
            <a th:href="@{/api/pharmacy/login}" th:text="#{Ok}"></a>
        </div>
    </div>
</form>
</body>
</HTML>
