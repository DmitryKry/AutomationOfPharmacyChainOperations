<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<HEAD>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <style>
        .star-rating {
            display: inline-flex;
            flex-direction: row-reverse;
            gap: 0.25rem;
            font-size: 2rem;
            justify-content: center;
        }

        /* Скрываем радио-кнопки */
        .star-rating input {
            display: none;
        }

        /* Метка-звезда */
        .star-rating label {
            cursor: pointer;
            font-size: inherit;
            line-height: 1;
            transition: color 0.2s ease;
            margin: 0;
            padding: 0;
            color: white;
            text-shadow: 0 0 0px yellow;
            -webkit-text-stroke: 1px #e0c000;
        }
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #ffcc00;
            text-shadow: none;
            -webkit-text-stroke: 0;
        }
        .star-rating label {
            -webkit-text-stroke: 1px #ffcc00;
        }
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            -webkit-text-stroke: 0;
        }

        .rating-value {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #555;
        }
    </style>
</HEAD>
<body>
    <div class="menu">
        <a class="authorization" th:href="@{/api/pharmacy/login}" th:text="#{authorization}"></a>
        <a class="registration" th:href="@{/api/pharmacy/registration}" th:text="#{registration}"></a>
        <a class="about_of_pharmacy" th:text="#{about_of_pharmacy}"></a>
        <a class="pharmacies" th:text="#{pharmacies}" th:href="@{/api/pharmacy/pharmacy}"></a>
        <a class="medicines" th:text="#{medicines}" th:href="@{/api/pharmacy/medicinePlace}"></a>
    </div>
    <div th:id="openFilter">
        <div th:id="filter">
            <form th:action="@{/api/pharmacy/registration}" method="post">
                <h2 align="center" th:text="#{filter}"></h2>
                <div class="form-group">
                    <label for="adress" th:text="#{adress}"></label>
                    <br>
                    <input type="text" id="adress" name="adress">
                </div>
                <div class="form-group">
                    <label for="grade" th:text="#{grade}">Рейтинг</label>
                    <br>
                    <div class="star-rating" id="grade">
                        <input type="radio" id="star5" name="grade" value="5">
                        <label for="star5" title="5 звёзд">★</label>

                        <input type="radio" id="star4" name="grade" value="4">
                        <label for="star4" title="4 звезды">★</label>

                        <input type="radio" id="star3" name="grade" value="3">
                        <label for="star3" title="3 звезды">★</label>

                        <input type="radio" id="star2" name="grade" value="2">
                        <label for="star2" title="2 звезды">★</label>

                        <input type="radio" id="star1" name="grade" value="1">
                        <label for="star1" title="1 звезда">★</label>
                    </div>

                    <input type="hidden" id="gradeHidden" name="grade_hidden">

                </div>

                <script>
                    const radioButtons = document.querySelectorAll('.star-rating input[name="grade"]');
                    const ratingDisplay = document.getElementById('ratingDisplay');
                    const hiddenInput = document.getElementById('gradeHidden');

                    function updateRating(value) {
                        if (value) {
                            ratingDisplay.textContent = `Выбрано звёзд: ${value}`;
                            if (hiddenInput) hiddenInput.value = value;
                        } else {
                            ratingDisplay.textContent = `Не выбрано`;
                            if (hiddenInput) hiddenInput.value = '';
                        }
                    }

                    radioButtons.forEach(radio => {
                        radio.addEventListener('change', function() {
                            if (this.checked) {
                                updateRating(this.value);
                            }
                        });
                    });
                    const checkedRadio = document.querySelector('.star-rating input[name="grade"]:checked');
                    if (checkedRadio) {
                        updateRating(checkedRadio.value);
                    }
                </script>


                <script>
                    document.getElementById('checkValueBtn').addEventListener('click', function() {
                        const selected = document.querySelector('.star-rating input[name="grade"]:checked');
                        const val = selected ? selected.value : 'не выбран';
                        document.getElementById('demoResult').innerHTML = `Текущий рейтинг: ${val}`;
                        console.log('Рейтинг для отправки:', val);
                    });
                </script>
                <div class="form-group">
                    <label for="coverage" th:text="#{coverage}"></label>
                    <br>
                    <input type="number" id="coverage" name="coverage">
                    <button type="submit" th:class="ButtonPost" th:text="#{find}"></button>
                </div>
            </form>
            <a th:href="@{/api/pharmacy/pharmacyCreate}" th:id="create" th:text="#{create}"></a>
        </div>
    </div>
    <div th:class="content">
        <ul>
            <li th:each="ph : ${pharmacies}">
                <a th:href="@{/api/pharmacy/pharmacy(pagin=15, page=${page})}">
                    <div class="for-photo"></div>
                    <div th:class="for-name" th:text="${ph.getName()}"></div>
                    <div th:class="for-content" th:text="${ph.getID_CITY()} + ' ' + ${ph.getAddress()}"></div>
                </a>
            </li>
        </ul>
        <div th:class="pagination">
            <a th:href="@{/api/pharmacy/pharmacy(pagin=${pagin - 15}, page=${page - 1})}" th:class="previous"><</a>
            <h5 th:text="${page}" />
            <a th:href="@{/api/pharmacy/pharmacy(pagin=${pagin + 15}, page=${page + 1})}" th:class="next">></a>
        </div>
    </div>
</body>
</HTML>
