<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<HEAD>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <style>
        .star-rating {
            display: inline-flex;
            flex-direction: row-reverse;
            gap: 0.25rem;
            font-size: 2rem;
            justify-content: center;
        }

        /* Скрываем радио-кнопки */
        .star-rating input {
            display: none;
        }

        /* Метка-звезда */
        .star-rating label {
            cursor: pointer;
            font-size: inherit;
            line-height: 1;
            transition: color 0.2s ease;
            margin: 0;
            padding: 0;
            color: white;
            text-shadow: 0 0 0px yellow;
            -webkit-text-stroke: 1px #e0c000;
        }
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #ffcc00;
            text-shadow: none;
            -webkit-text-stroke: 0;
        }
        .star-rating label {
            -webkit-text-stroke: 1px #ffcc00;
        }
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            -webkit-text-stroke: 0;
        }

        .rating-value {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #555;
        }
    </style>
    <script>
        const radioButtons = document.querySelectorAll('.star-rating input[name="grade"]');
        const ratingDisplay = document.getElementById('ratingDisplay');
        const hiddenInput = document.getElementById('gradeHidden');

        function updateRating(value) {
            if (value) {
                ratingDisplay.textContent = `Выбрано звёзд: ${value}`;
                if (hiddenInput) hiddenInput.value = value;
            } else {
                ratingDisplay.textContent = `Не выбрано`;
                if (hiddenInput) hiddenInput.value = '';
            }
        }

        radioButtons.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.checked) {
                    updateRating(this.value);
                }
            });
        });
        const checkedRadio = document.querySelector('.star-rating input[name="grade"]:checked');
        if (checkedRadio) {
            updateRating(checkedRadio.value);
        }
        document.getElementById('checkValueBtn').addEventListener('click', function() {
            const selected = document.querySelector('.star-rating input[name="grade"]:checked');
            const val = selected ? selected.value : 'не выбран';
            document.getElementById('demoResult').innerHTML = `Текущий рейтинг: ${val}`;
            console.log('Рейтинг для отправки:', val);
        });
    </script>
</HEAD>
<body>
<div class="menu">
    <a th:if="${user == null}" class="authorization" th:href="@{/api/pharmacy/login}" th:text="#{authorization}"></a>
    <a th:if="${user == null}" class="registration" th:href="@{/api/pharmacy/registration}" th:text="#{registration}"></a>
    <a th:if="${user != null}" class="registration" th:href="@{/api/pharmacy/userView(userID=${user.getId()})}" th:text="#{user}"></a>
    <a th:if="${user != null}" class="authorization" th:href="@{/api/pharmacy/orders(userID=${user.getId()})}" th:text="#{basket}"></a>
    <a th:if="${user != null}" class="orders" th:href="@{/api/pharmacy/ordersList(userID=${user.getId()})}" th:text="#{orders}"></a>
    <a class="pharmacies" th:text="#{pharmacies}" th:href="@{/api/pharmacy/pharmacy(userID=${user.getId()})}"></a>
    <a class="medicines" th:text="#{medicines}" th:href="@{/api/pharmacy/medicinePlace(userID=${user.getId()})}"></a>
</div>
    <div th:id="openFilter">
        <div th:id="filter">
            <form th:action="@{/api/pharmacy/pharmacy(userID=${user.getId()}, orderID=${orderID != null ? orderID : ''})}" method="post">
                <h2 align="center" th:text="#{filter}"></h2>
                <div class="form-group">
                    <label for="name" th:text="#{name}"></label>
                    <br>
                    <input type="text" id="name" name="name">
                </div>
                <div class="form-group">
                    <label for="REGION" th:text="#{REGION}"></label>
                    <br>
                    <input type="text" id="REGION" name="REGION">
                </div>
                <div class="form-group">
                    <label for="CITY" th:text="#{CITY}"></label>
                    <br>
                    <input type="text" id="CITY" name="CITY">
                </div>
                <div class="form-group">
                    <label for="adress" th:text="#{adress}"></label>
                    <br>
                    <input type="text" id="adress" name="adress">
                </div>
                <button th:if="${user != null ? true : false}" type="submit" th:class="ButtonPost" th:text="#{find}"></button>
            </form>
            <a th:if="${user != null ? user.getRole() == 1 : false}" th:href="@{/api/pharmacy/pharmacyCreate(userID=${user.getId()})}" th:id="create" th:text="#{create}"></a>
        </div>
    </div>
    <div th:class="content">
        <ul>
            <li th:each="ph : ${pharmacies}" th:if="${ph.getClosing_date() == null}">
                <a th:if="${orderID == null}" th:href="@{/api/pharmacy/pharmacyView(idPharmacy=${ph.getId()}, userID=${user.getId()})}">
                    <div class="for-photo">
                        <ul th:if="${!photos.isEmpty()}">
                            <li th:each="photo : ${photos}">
                                <img th:if="${photo.getEntityId() == ph.getId()}"
                                     th:src="${photo.getPhotoPath()}">
                            </li>
                        </ul>
                    </div>
                    <div th:class="for-name" th:text="${ph.getName()}"></div>
                    <div th:class="for-content" th:text="${ph.getCityName()} + ' ' + ${ph.getAddress()}"></div>
                </a>
                <a th:if="${orderID != null}" th:href="@{/api/pharmacy/orders(idPharmacy=${ph.getId()}, userID=${user.getId()},
                orderID=${orderID != null ? orderID : ''})}">
                    <div class="for-photo">
                        <ul th:if="${!photos.isEmpty()}">
                            <li th:each="photo : ${photos}">
                                <img th:if="${photo.getEntityId() == ph.getId()}"
                                     th:src="${photo.getPhotoPath()}">
                            </li>
                        </ul>
                    </div>
                    <div th:class="for-name" th:text="${ph.getName()}"></div>
                    <div th:class="for-content" th:text="${ph.getCityName()} + ' ' + ${ph.getAddress()}"></div>
                </a>
            </li>
        </ul>
        <div th:class="pagination">
            <a th:href="@{/api/pharmacy/pharmacy(pagin=${pagin - 15}, page=${page - 1}, userID=${user.getId()},
            orderID=${orderID != null ? orderID : ''})}" th:class="previous"><</a>
            <h5 th:text="${page}" />
            <a th:href="@{/api/pharmacy/pharmacy(pagin=${pagin + 15}, page=${page + 1}, userID=${user.getId()},
            orderID=${orderID != null ? orderID : ''})}" th:class="next">></a>
        </div>
    </div>
    <div th:class="findPerconal" th:id="okForm" th:if="${InfoErrorShow == true}">
        <H3 th:text="${InfoError}"></H3>
        <div>
            <a th:href="@{/api/pharmacy/pharmacy(InfoErrorShow = false,
            pagin=${pagin}, page=${page}, userID=${user.getId()}, orderID=${orderID != null ? orderID : ''})}" th:text="#{Ok}"></a>
        </div>
    </div>
</body>
</HTML>
