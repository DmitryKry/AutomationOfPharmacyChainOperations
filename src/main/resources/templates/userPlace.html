<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <HEAD>
        <meta charset="UTF-8">
        <title>Вход</title>
        <link rel="stylesheet" th:href="@{/style.css}">
    </HEAD>
    <body>
    <div th:if="${user != null}">
        <p>Добро пожаловать, <span th:text="${user.login}">Имя пользователя</span>!</p>
    </div>
    <div th:if="${user == null}">
        <p style="color: red;">Неверный логин или пароль</p>
    </div>
    </body>
</HTML>
