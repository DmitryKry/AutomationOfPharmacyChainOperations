<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<HEAD>
    <meta charset="UTF-8">
    <title>–ö–∞—Ä—Ç–æ—á–∫–∞ –∞–ø—Ç–µ–∫–∏</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</HEAD>
<body>
<div class="AllInfo">
    <div class="menu">
        <a th:if="${user == null}" class="authorization" th:href="@{/api/pharmacy/login}" th:text="#{authorization}"></a>
        <a th:if="${user == null}" class="registration" th:href="@{/api/pharmacy/registration}" th:text="#{registration}"></a>
        <a th:if="${user != null}" class="registration" th:href="@{/api/pharmacy/userView(userID=${user.getId()})}" th:text="#{user}"></a>
        <a th:if="${user != null}" class="authorization" th:href="@{/api/pharmacy/orders(userID=${user.getId()})}" th:text="#{basket}"></a>
        <a th:if="${user != null}" class="orders" th:href="@{/api/pharmacy/ordersList(userID=${user.getId()})}" th:text="#{orders}"></a>
        <a class="pharmacies" th:text="#{pharmacies}" th:href="@{/api/pharmacy/pharmacy(userID=${user.getId()})}"></a>
        <a class="medicines" th:text="#{medicines}" th:href="@{/api/pharmacy/medicinePlace(userID=${user.getId()})}"></a>
    </div>
    <div th:id="forPhotoOrders">
        <img th:if="${photos != null && photos.getPhotoPath() != null}"
             th:src="${photos.getPhotoPath()}">
    </div>
    <a th:if="${idPharmacy == null && !medicines.isEmpty()}" th:class="edit" th:id="order" th:text="#{specifyAPharmacy}" th:href="@{/api/pharmacy/pharmacy(
    userID=${user.getId()},
    orderID=${orderMedicines != null and orderMedicines.size() > 0 ? orderMedicines[0].orderId : null})}"></a>
    <a th:if="${idPharmacy != null}" th:class="edit" th:id="order" th:text="#{final}" th:href="@{/api/pharmacy/orders(
    userID=${user.getId()}, idPharmacy=${idPharmacy}, orderID=${orderID != null ? orderID : ''}, finalTrue=true)}"></a>
    <div id="ordersContent">
        <div id="infoOrder"><H1 th:text="#{basket}"></H1></div>
        <ul>
            <li th:each="med : ${medicines}" th:data-medicine-id="${med.getId()}"
                th:data-user-id="${user.getId()}"
                class="medicine-item">
                <div class="medicine-info" th:text="${med.getName()} + ' ' + ${med.getBrandName()} + ' ' +
                ${med.getDosageStrength()} + ' ' + ${med.getCountryName()} + ' ' + ${med.getPackageQuantity()}
                + ' ' + ${med.getUnitOfMeasure()}
                + ' ' + #{price} + ' ' + ${med.getPrice()}"></div>
                <ul>
                    <li th:each="oM : ${orderMedicines}" th:if="${med.getId() == oM.getIdOfMedicine()}">
                        <a class="plus-btn" th:if="${med.getId() == oM.getIdOfMedicine() && idPharmacy == null}"
                           th:href="@{/api/pharmacy/orders(userID=${user.getId()}, medicineID=${med.getId()},
                           count=${oM.getCount() + 1}, orderMedicine=${oM.getId()})}">+</a>
                        <span class="quantity-value" th:if="${med.getId() == oM.getIdOfMedicine()}"
                              th:text="${oM.getCount() == null ? 1 : oM.getCount()}"></span>
                        <a class="minus-btn" th:if="${med.getId() == oM.getIdOfMedicine() && idPharmacy == null}"
                           th:href="@{/api/pharmacy/orders(userID=${user.getId()}, medicineID=${med.getId()},
                           count=${oM.getCount() - 1}, orderMedicine=${oM.getId()})}">-</a>
                    </li>
                </ul>

            </li>
        </ul>
    </div>
</div>
<div th:class="findPerconal" th:id="createPrescriptionForm" th:if="${finalTrue == true}">
    <h3 th:text="${InfoError}"></h3>

    <div class="receipt">
        <h4>–ß–µ–∫ –∑–∞–∫–∞–∑–∞ #<span th:text="${orderID}"></span></h4>

        <table class="receipt-table">
            <thead>
            <tr>
                <th>–ù–∞–∏–º–µ–Ω–æ–≤–∞–Ω–∏–µ</th>
                <th>–ö–æ–ª-–≤–æ</th>
                <th>–¶–µ–Ω–∞</th>
                <th>–°—É–º–º–∞</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="orderMed : ${orderMedicines}">
                <td th:text="${orderMed.getNameMed()}">
                </td>
                <td th:text="${orderMed.count}"></td>
                <td th:text="${orderMed.getPriceMed()} + '‚ÇΩ'"></td>
                <td th:text="${orderMed.count * orderMed.getPriceMed()} + '‚ÇΩ'"></td>
            </tr>
            </tbody>
            <tfoot>
            <tr>
                <td colspan="3"><strong>–ò—Ç–æ–≥–æ:</strong></td>
                <td>
                    <strong th:text="${order.getCost()} + '‚ÇΩ'">
                    </strong>
                </td>
            </tr>
            </tfoot>
        </table>
        <input type="hidden" th:id="orderID" th:value="${order.getId()}">
        <input type="hidden" th:id="idPharmacy" th:value="${idPharmacy}">
        <input type="hidden" id="userId" th:value="${user.getId()}">
        <button th:class="AcceptTheOrder" th:if="${user.getRole() != 2}" th:text="#{AcceptTheOrder}"></button>
    </div>
    <script th:if="${finalTrue == true && order.getCost() == null}">
        setTimeout(function() {
            location.reload();
        }, 100);
    </script>
    <div>
        <a th:href="@{/api/pharmacy/orders(userID=${user.getId()}, orderID=${orderID})}"
           th:text="#{Ok}"></a>
    </div>
</div>
<div th:class="findPerconal" th:id="okForm" th:if="${InfoErrorShow == true}">
    <H3 th:text="${InfoError}"></H3>
    <div>
        <a th:href="@{/api/pharmacy/orders(InfoErrorShow = false,
        userID=${user.getId()}, idPharmacy=${pharmacy != null ? pharmacy.getId() : ''})}" th:text="#{Ok}"></a>
    </div>
</div>
<script>
    let hoverTimer = null;
    let currentOrderId = null;

    document.querySelectorAll('.AcceptTheOrder').forEach(item => {
        item.addEventListener('click', function (e) {
            const userId = document.getElementById('userId').value;
            const orderID = document.getElementById('orderID').value;
            const idPharmacy = document.getElementById('idPharmacy').value;

            if (hoverTimer) {
                clearTimeout(hoverTimer);
                hoverTimer = null;
            }

            window.location.href = `/api/pharmacy/orders?userID=${userId}&idPharmacy=${idPharmacy}&orderID=${orderID}&pay=${true}`;
        });
    });

    document.querySelectorAll('.medicine-item').forEach(item => {
        item.addEventListener('mouseenter', function (e) {
            const userId = this.getAttribute('data-user-id');
            const medicineId = this.getAttribute('data-medicine-id');

            if (currentOrderId !== medicineId) {
                if (hoverTimer) clearTimeout(hoverTimer);
                currentOrderId = medicineId;
            }

            hoverTimer = setTimeout(() => {
                window.location.href = `/api/pharmacy/orders?userID=${userId}&medicineID=${medicineId}`;
            }, 500);
        });

        item.addEventListener('mouseleave', function(e) {
            if (hoverTimer) {
                clearTimeout(hoverTimer);
                hoverTimer = null;
                currentOrderId = null;
            }
        });

        item.addEventListener('click', function(e) {
            e.stopPropagation();
            if (hoverTimer) {
                clearTimeout(hoverTimer);
                hoverTimer = null;
            }
            const userId = this.getAttribute('data-user-id');
            const medicineId = this.getAttribute('data-medicine-id');
            updatePhoto(userId, medicineId);
        });
    });

    function updatePhoto(userId, medicineId) {
        fetch(`/api/pharmacy/orders?userID=${userId}&medicineID=${medicineId}`, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            }
        })
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const newPhoto = doc.querySelector('#forPhotoOrders img');
                const currentPhoto = document.querySelector('#forPhotoOrders img');

                if (newPhoto && currentPhoto) {
                    currentPhoto.src = newPhoto.src;
                } else if (newPhoto) {
                    document.querySelector('#forPhotoOrders').innerHTML = newPhoto.outerHTML;
                }
            })
            .catch(error => console.error('Error:', error));
    }
</script>
</body>
</html>
