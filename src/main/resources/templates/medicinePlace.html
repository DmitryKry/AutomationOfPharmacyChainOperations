<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<HEAD>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <script>
        // Скрипт в head, но обёрнут в событие загрузки DOM
        document.addEventListener('DOMContentLoaded', function() {
            var toggleBtn = document.querySelector('.toggle-link');
            var openFilter = document.getElementById('openFilter');

            if (toggleBtn && openFilter) {
                toggleBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    openFilter.classList.toggle('hide-filter');
                });
            }
        });
    </script>
</HEAD>
<body>
    <div class="menu">
        <a class="authorization" th:href="@{/api/pharmacy/login}" th:text="#{authorization}"></a>
        <a class="registration" th:href="@{/api/pharmacy/registration}" th:text="#{registration}"></a>
        <a class="about_of_pharmacy" th:text="#{about_of_pharmacy}"></a>
        <a class="pharmacies" th:text="#{pharmacies}" th:href="@{/api/pharmacy/pharmacy}"></a>
        <a class="medicines" th:text="#{medicines}"></a>
    </div>
    <div th:id="openFilter">
        <div th:id="filter">
            <form th:action="@{/api/pharmacy/registration}" method="post">
                <h2 align="center" th:text="#{filterMedicine}"></h2>
                <div class="form-group">
                    <label for="adress" th:text="#{adress}"></label>
                    <br>
                    <input type="text" id="adress" name="adress">
                </div>
                <div class="form-group">
                    <label for="grade" th:text="#{grade}"></label>
                    <br>
                    <input type="text" id="grade" name="grade">
                </div>
                <div class="form-group">
                    <label for="coverage" th:text="#{coverage}"></label>
                    <br>
                    <input type="password" id="coverage" name="coverage">
                    <button type="submit" th:class="ButtonPost" th:text="#{find}"></button>
                </div>
            </form>
            <a th:href="@{/api/pharmacy/medicineCreate}" th:id="create" th:text="#{create}"></a>
        </div>
    </div>
    <div th:class="content">
        <ul>
            <li th:each="med : ${medicines}">
                <a th:href="@{/api/pharmacy/medicineView(idMedicine=${med.getId()})}">
                    <div class="for-photo" id="medPlace">
                        <ul th:if="${!photos.isEmpty()}">
                            <li th:each="ph : ${photos}">
                                <img th:if="${ph.getEntityId() == med.getId()}"
                                     th:src="${ph.getPhotoPath()}">
                            </li>
                        </ul>
                    </div>
                    <div th:class="for-name" th:text="${med.getName()}"></div>
                    <div th:class="for-content" th:text="${med.getBrandName()} + ' ' + ${med.getCountryName()}"></div>
                    <div th:class="for-content" th:text="${med.getDosageFormName()}  + ' ' + ${med.getDosageStrength()}
  + ' ' + ${med.getPackageQuantity()} + ' ' + ${med.unitOfMeasure}"></div>
                    <div th:class="for-content" th:text="${med.getPrice()} + ' ' + #{currency}"></div>
                </a>
            </li>
        </ul>
        <div th:class="pagination">
            <a th:href="@{/api/pharmacy/pharmacy(pagin=${pagin - 15}, page=${page - 1})}" th:class="previous"><</a>
            <h5 th:text="${page}" />
            <a th:href="@{/api/pharmacy/pharmacy(pagin=${pagin + 15}, page=${page + 1})}" th:class="next">></a>
        </div>
    </div>
</body>
</HTML>
