<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<HEAD>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var toggleBtn = document.querySelector('.toggle-link');
            var openFilter = document.getElementById('openFilter');

            if (toggleBtn && openFilter) {
                toggleBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    openFilter.classList.toggle('hide-filter');
                });
            }
        });
    </script>
    <script th:if="${needScroll}">
        window.addEventListener("load", function() {
            setTimeout(function() {

                var container = document.querySelector('#filter');

                if (container) {

                    container.scrollTo({
                        top: container.scrollHeight,
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>

</HEAD>
<body>
<div class="menu">
    <a th:if="${user == null}" class="authorization" th:href="@{/api/pharmacy/login}" th:text="#{authorization}"></a>
    <a th:if="${user == null}" class="registration" th:href="@{/api/pharmacy/registration}" th:text="#{registration}"></a>
    <a th:if="${user != null}" class="registration" th:href="@{/api/pharmacy/userView(userID=${user.getId()})}" th:text="#{user}"></a>
    <a th:if="${user != null}" class="authorization" th:href="@{/api/pharmacy/orders(userID=${user.getId()})}"  th:text="#{basket}"></a>
    <a class="pharmacies" th:text="#{pharmacies}" th:href="@{/api/pharmacy/pharmacy(userID=${user.getId()})}"></a>
    <a class="medicines" th:text="#{medicines}" th:href="@{/api/pharmacy/medicinePlace(userID=${user.getId()})}"></a>
</div>
<div th:id="openFilter">
    <div th:id="filter">
        <form th:action="@{/api/pharmacy/medicinePlace(userID=${user.getId()})}" method="post" th:object="${filter}">

            <div class="filter-grid">
                <div class="filter-section">
                    <div class="form-group">
                        <label for="filter-name" th:text="#{name}"></label>
                        <input type="text" id="filter-name" name="name">
                    </div>
                    <div class="form-group">
                        <label for="filter-international-name" th:text="#{medicine.international_name}"></label>
                        <input type="text" id="filter-international-name" name="internationalName">
                    </div>
                    <div class="form-group">
                        <label for="filter-dosage-strength" th:text="#{medicine.dosage_strength}"></label>
                        <input type="text" id="filter-dosage-strength" name="dosageStrength">
                        <label for="filter-package-quantity-min" th:text="#{medicine.package_quantity}"></label>
                    </div>
                    <div class="form-group_row">
                        <div class="form-group">
                            <label for="filter-package-quantity-min" th:text="#{from}"></label>
                            <input th:class="from" type="number" id="filter-package-quantity-min" name="packageQuantityMin">
                        </div>
                        <div class="form-group">

                    <div class="form-group">
                        <label for="filter-prescription-required" th:text="#{medicine.prescription_required}"></label>
                        <select id="filter-prescription-required" name="prescriptionRequired">
                            <option value="" th:text="#{all}"></option>
                            <option value="true" th:text="#{yes}"></option>
                            <option value="false" th:text="#{no}"></option>
                        </select>
                        <label for="filter-prescription-required" th:text="#{price}"></label>
                    </div>
                </div>

                <div class="filter-section">
                    <div class="form-group_row">

                        <input type="hidden" th:name="brandId" th:value="${brand_id}">

                    </div>
                    <a th:href="@{/api/pharmacy/medicinePlace(atc_id=${atc_id}, userID=${user.getId()},

                            manufacturer_id=${manufacturer_id},
                            selectManufacturer=${selectManufacturer},
                            country_id=${country_id},
                            selectCountry=${selectCountry},
                            pharmacological_group_id=${pharmacological_group_id},
                            selectPharmacologicalGroup=${selectPharmacologicalGroup},
                            therapeutic_group_id=${therapeutic_group_id},
                            selectTherapeuticGroup=${selectTherapeuticGroup},
                            prescription_form_id=${prescription_form_id},
                            selectPrescriptionForm=${selectPrescriptionForm},
                            package_type_id=${package_type_id},
                            selectPackageType=${selectPackageType},
                            dosage_form_id=${dosage_form_id},
                            selectDosageForm=${selectDosageForm},
                            brand_id=${brand_id},
                            selectBrand=${selectBrand},
                    addBrand=${addBrand == false ? true : false},
                    idMedicine=${medicine != null ? medicine.getId() : ''}, needScroll=true)}"
                       th:text="#{find}"></a>
                </div>
            </div>
            <button type="submit" th:class="ButtonPost" th:text="#{find}"></button>
        </form>
        <a th:if="${user.getRole() == 1}" th:href="@{/api/pharmacy/medicineCreate(userID=${user.getId()})}" th:id="create" th:text="#{create}"></a>
    </div>
</div>
<div th:class="content">
    <ul>
        <li th:each="med : ${medicines}">
            <a th:href="@{/api/pharmacy/medicineView(idMedicine=${med.getId()}, userID=${user.getId()})}">
                <div class="for-photo" id="medPlace">
                    <ul th:if="${photos != null and !photos.isEmpty()}">
                        <li th:each="ph : ${photos}">
                            <img th:if="${ph.getEntityId() == med.getId()}"
                                 th:src="${ph.getPhotoPath()}">
                        </li>
                    </ul>
                </div>
                <div th:class="for-name" th:text="${med.getName()}"></div>
                <div th:class="for-content" th:text="${med.getBrandName()} + ' ' + ${med.getCountryName()}"></div>
                <div th:class="for-content" th:text="${med.getDosageFormName()}  + ' ' + ${med.getDosageStrength()}
  + ' ' + ${med.getPackageQuantity()} + ' ' + ${med.unitOfMeasure}"></div>
                <div th:class="for-content" th:text="${med.getPrice()} + ' ' + #{currency}"></div>
            </a>
        </li>
    </ul>
    <div th:class="pagination">
        <a th:href="@{/api/pharmacy/medicinePlace(pagin=${pagin - 15}, page=${page - 1}, userID=${user.getId()})}" th:class="previous"><</a>
        <h5 th:text="${page}" />
        <a th:href="@{/api/pharmacy/medicinePlace(pagin=${pagin + 15}, page=${page + 1}, userID=${user.getId()})}" th:class="next">></a>
    </div>
</div>

    <div>

                            country_id=${country_id},

                        <span th:text="${b.getName()}"></span>
                    </a>

            </li>

    </div>

                            selectPrescriptionForm=${selectPrescriptionForm},

                            selectPackageType=${selectPackageType},

                            selectDosageForm=${selectDosageForm}, idMedicine=${medicine != null ? medicine.getId() : ''}, needScroll=true)}"
           th:text="#{cancel}"></a>
    </div>
</div>
