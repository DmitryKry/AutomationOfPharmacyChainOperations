<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<HEAD>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</HEAD>
<body>
<div class="menu">
    <a class="authorization" th:href="@{/api/pharmacy/login}" th:text="#{authorization}"></a>
    <a class="registration" th:href="@{/api/pharmacy/registration}" th:text="#{registration}"></a>
</div>
<form th:action="@{/api/pharmacy/registration}" method="post" th:if="${user == null}">
    <div class="Entrace">
        <h2 th:text="#{view.registration}"></h2>
        <div class="form-group">
            <label for="login" th:text="#{login}"></label>
            <br>
            <input type="text" id="login" name="login" required>
        </div>
        <div class="form-group">
            <label for="data_of_birt" th:text="#{data_of_birt}"></label>
            <br>
            <input type="date" id="data_of_birt" name="data_of_birt" required>
        </div>
        <div class="form-group">
            <label for="phone" th:text="#{phone}"></label>
            <br>
            <input type="text" id="phone" name="phone" required>
        </div>
        <div class="form-group">
            <label for="email" th:text="#{email}"></label>
            <br>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="fio" th:text="#{fio}"></label>
            <br>
            <input type="text" id="fio" name="fio" required>
        </div>
        <div class="form-group">
            <label for="passport" th:text="#{passport}"></label>
            <br>
            <input type="text" id="passport" name="passport">
        </div>
        <div class="form-group">
            <label for="password" th:text="#{password}"></label>
            <br>
            <input type="password" id="password" name="password" required>
            <button type="submit" th:class="ButtonPost" th:text="#{regisres}"></button>
        </div>
    </div>
    <div th:class="findPerconal" th:id="okForm" th:if="${InfoErrorShow == true}">
        <H3 th:text="${InfoError}"></H3>
        <div>
            <a th:href="@{/api/pharmacy/registration}" th:text="#{Ok}"></a>
        </div>
    </div>
</form>
</body>
</HTML>
